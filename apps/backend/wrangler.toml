name = "recycle-erp-backend"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# In production, replace direct DATABASE_URL with a Hyperdrive binding:
#
# [[hyperdrive]]
# binding = "HYPERDRIVE"
# id = "<hyperdrive-id-from-dashboard>"
#
# The Worker prefers env.HYPERDRIVE.connectionString when present.

# Workers AI binding for label OCR (used when no OPENROUTER_API_KEY is set).
[ai]
binding = "AI"

# R2 bucket for sell-order status attachments (packing slips, invoices,
# proof of payment) AND camera label-scan images (stored under the
# label-scans/ prefix). Create the bucket + a public dev/prod URL, then
# uncomment and set R2_ATTACHMENTS_PUBLIC_URL below. Without it, uploads
# fall back to a stub and label-scan previews are hidden by the frontend.
[[r2_buckets]]
binding = "R2_ATTACHMENTS"
bucket_name = "recycle-erp-attachments"

[vars]
JWT_ISSUER = "recycle-erp"
R2_ATTACHMENTS_PUBLIC_URL = "https://static.recycleservers.com"

# Secrets (set via `wrangler secret put`):
#   - JWT_SECRET
#   - DATABASE_URL          (only if not using Hyperdrive)
#   - OPENROUTER_API_KEY    (label OCR; default provider)
#
# Label-scan images now use R2 (above), not Cloudflare Images — no
# CF_ACCOUNT_ID / CF_IMAGES_TOKEN secrets are required.
#
# For local dev, copy .dev.vars.example to .dev.vars and fill it in.

[observability]
enabled = true

services:
  postgres:
    image: postgres:16-alpine
    container_name: recycle_pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: recycle
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      POSTGRES_DB: recycle_erp
    # No host port: backend reaches Postgres as `postgres:5432` over the
    # compose network. Not publishing 5432 keeps the DB off the host.
    volumes:
      - recycle_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recycle -d recycle_erp"]
      interval: 5s
      timeout: 3s
      retries: 10
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    # The official postgres entrypoint runs as root, fixes ownership/perms on
    # the data dir, then steps down to the `postgres` user. cap_drop: ALL
    # removes the caps that needs (chown/chmod + setuid/setgid), so the
    # container crash-loops with "Operation not permitted". Add back exactly
    # the entrypoint's required caps — nothing more.
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - FSETID
      - SETGID
      - SETUID
    mem_limit: 512m
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: recycle_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - apps/backend/.env
    environment:
      DATABASE_URL: postgres://recycle:${POSTGRES_PASSWORD:?set in .env}@postgres:5432/recycle_erp
      PORT: "8787"
    # Bind to loopback only: Caddy reverse-proxies /api/* to backend:8787
    # over the internal compose network, so a 0.0.0.0 binding would bypass
    # Caddy. Loopback keeps the port reachable from the host shell and via
    # SSH tunnel for dev tooling without exposing it to the network.
    ports:
      - "127.0.0.1:8787:8787"
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    mem_limit: 512m
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  web:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: recycle_web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    # The Caddy binary ships with a cap_net_bind_service file capability so it
    # can bind :80 as non-root. With cap_drop: ALL + no-new-privileges the
    # kernel refuses to exec a file whose file caps aren't in the bounding set
    # ("exec ... operation not permitted"). Add the one cap it needs.
    cap_add:
      - NET_BIND_SERVICE
    mem_limit: 256m
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  recycle_pgdata:

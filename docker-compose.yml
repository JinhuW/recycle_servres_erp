services:
  postgres:
    image: postgres:16-alpine
    container_name: recycle_pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: recycle
      POSTGRES_PASSWORD: recycle
      POSTGRES_DB: recycle_erp
    ports:
      - "5432:5432"
    volumes:
      - recycle_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recycle -d recycle_erp"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: recycle_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - apps/backend/.env
    environment:
      DATABASE_URL: postgres://recycle:recycle@postgres:5432/recycle_erp
      PORT: "8787"
    # Published to the host so the Vite dev server (:5173) and other host
    # clients can reach the API at localhost:8787, matching the pre-Docker
    # contract. The web/Caddy container still reaches it as backend:8787.
    ports:
      - "8787:8787"

  web:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: recycle_web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  recycle_pgdata:

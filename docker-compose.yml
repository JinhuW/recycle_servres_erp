services:
  postgres:
    image: postgres:16-alpine
    container_name: recycle_pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: recycle
      # Default to `recycle` so a fresh clone runs `docker compose up` with
      # zero setup. Override via repo-root .env (or shell env) for prod.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-recycle}
      POSTGRES_DB: recycle_erp
    # No host port: backend reaches Postgres as `postgres:5432` over the
    # compose network. Not publishing 5432 keeps the DB off the host.
    # Bind-mounted to ./data/postgres so the cluster's files are visible on
    # the host (easy to back up, inspect, or wipe with `rm -rf data/postgres`).
    # The dir is gitignored. The official postgres entrypoint chowns it to its
    # `postgres` user on first boot — the cap_add block below allows that.
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recycle -d recycle_erp"]
      interval: 5s
      timeout: 3s
      retries: 10
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    # The official postgres entrypoint runs as root, fixes ownership/perms on
    # the data dir, then steps down to the `postgres` user. cap_drop: ALL
    # removes the caps that needs (chown/chmod + setuid/setgid), so the
    # container crash-loops with "Operation not permitted". Add back exactly
    # the entrypoint's required caps — nothing more.
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - FSETID
      - SETGID
      - SETUID
    mem_limit: 512m
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
    container_name: recycle_pg_exporter
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # The metrics role is created by migration 0042 and only has
      # pg_monitor — no application-table access.
      DATA_SOURCE_NAME: "postgresql://metrics:${POSTGRES_METRICS_PASSWORD:-metrics}@postgres:5432/recycle_erp?sslmode=disable"
      PG_EXPORTER_AUTO_DISCOVER_DATABASES: "false"
      # Default exposes :9187/metrics inside the compose net; not host-published.
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    mem_limit: 64m
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: recycle_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    # Single repo-root .env — same file Compose itself interpolates from and
    # host-side `pnpm dev` reads via scripts/load-env.mjs. Optional: fresh
    # clones boot without it (Dockerfile ENV supplies dev defaults for
    # JWT_SECRET / NODE_ENV / ENABLE_DEMO_ACCOUNTS / ADMIN_*).  Real deploys
    # drop secrets (JWT_SECRET, R2_*, OPENROUTER_API_KEY, CORS_ALLOWED_ORIGINS)
    # in `.env` and they win over the image defaults.
    env_file:
      - path: .env
        required: false
    environment:
      # DATABASE_URL is network-derived (compose hostname `postgres`), so it
      # MUST come from compose. The .env value points at localhost for host
      # `pnpm dev`; this override flips it onto the compose network.
      DATABASE_URL: postgres://recycle:${POSTGRES_PASSWORD:-recycle}@postgres:5432/recycle_erp
      PORT: "8787"
    # No host-port publish — the only consumer is Caddy, which reaches the
    # backend as `backend:8787` over the internal compose network. Skipping
    # the host bind also avoids clashing with a parallel `pnpm dev` that
    # often holds :8787 on the host. To hit the API directly during compose
    # debugging, use `docker compose exec backend wget -qO- localhost:8787/api/health`
    # or temporarily add `ports: ["127.0.0.1:8787:8787"]` in a local override.
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    mem_limit: 512m
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  web:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: recycle_web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"
      - "9090:9090"
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    # The Caddy binary ships with a cap_net_bind_service file capability so it
    # can bind :80 as non-root. With cap_drop: ALL + no-new-privileges the
    # kernel refuses to exec a file whose file caps aren't in the bounding set
    # ("exec ... operation not permitted"). Add the one cap it needs.
    cap_add:
      - NET_BIND_SERVICE
    mem_limit: 256m
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
